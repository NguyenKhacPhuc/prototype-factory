<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototype Preview</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>window.react = window.React;</script>
<script src="https://unpkg.com/lucide-react@0.469.0/dist/umd/lucide-react.min.js"></script>
<script>window.lucide = window.LucideReact || {};</script>
</head>
<body>
<div id="root"></div>
<script>
  // Register TypeScript + JSX preset for Babel standalone
  Babel.registerPreset('tsx', {
    presets: [
      [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
      [Babel.availablePresets['react']]
    ]
  });
</script>
<!--
  USAGE: Copy this file alongside your App.tsx prototype.
  The App.tsx MUST:
    1. Use `const { useState, useEffect } = React;` instead of `import React, { useState } from 'react';`
    2. Use `function App()` instead of `export default function App()`
    3. NOT use any import/export statements
  Then serve via HTTP (e.g. `npx serve .` or `python3 -m http.server`)
-->
<script type="text/babel" data-presets="tsx" src="App.tsx"></script>
<script type="text/babel" data-presets="tsx">
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
